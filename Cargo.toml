[package]
name = "aicent-vessel"
version = "0.1.0-alpha"
authors = ["Aicent.com Organization"]
edition = "2021"
description = "The Sovereign Retina of the Aicent Stack: A Rust-saturated interface for perceiving and orchestrating the planetary neural grid."
license = "Apache-2.0"
repository = "https://github.com/Aicent-Stack/aicent-vessel"
readme = "README.md"
keywords = ["sovereign-ai", "vessel", "rttp", "rpki", "zcmk"]
categories = ["asynchronous", "network-programming", "visualization", "embedded"]

# -----------------------------------------------------------------------------
# THE NEURAL INTEGRATION: Linking to the Sovereign Constellation
# We pull the core standard directly from the official registry.
# -----------------------------------------------------------------------------

[dependencies]
# Standard Sovereign Pillars
epoekie    = "0.1.0-alpha"  # The Soul
aicent     = "0.1.0-alpha"  # The Brain
rttp       = "0.1.0-alpha"  # The Nerves
rpki-com   = "0.1.0-alpha"  # The Immunity
zcmk       = "0.1.0-alpha"  # The Blood

# High-Performance Asynchronous Runtime
tokio = { version = "1.37", features = ["full", "tracing"] }

# Modern UI / Rendering Base
# (Note: Using Tauri-compatible serialization for high-frequency dashboard)
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Strategic Telemetry Hooks
log = "0.4"
tracing = "0.1"

# -----------------------------------------------------------------------------
# PROJECT STRUCTURE
# -----------------------------------------------------------------------------

[lib]
name = "aicent_vessel"
path = "src/lib.rs"

[[bin]]
name = "vessel-core"
path = "src/main.rs"

# -----------------------------------------------------------------------------
# RELEASE PROFILE: Zero-Latency Rendering
# -----------------------------------------------------------------------------

[profile.release]
opt-level = 3           # Maximum performance for real-time visualization
lto = true              # Link-Time Optimization for sub-ms reflex arc
codegen-units = 1       # Saturated logic optimization
panic = "abort"         # Fail-safe mode
strip = "symbols"       # Defensive stripping of internal metadata
