[package]
name = "aicent-vessel"
version = "0.1.0-alpha"
authors = ["Aicent.com Organization"]
edition = "2021"
description = "The Sovereign Retina of the Aicent Stack: A Rust-saturated interface for perceiving and orchestrating the planetary neural grid."
license = "Apache-2.0"
repository = "https://github.com/Aicent-Stack/aicent-vessel"
readme = "README.md"
keywords = ["sovereign-ai", "vessel", "rttp", "rpki", "zcmk"]
categories = ["asynchronous", "network-programming", "visualization", "embedded"]

# -----------------------------------------------------------------------------
# BINARIES & EXAMPLES: The Sovereign Viewports
# -----------------------------------------------------------------------------

[[bin]]
name = "vessel-core"
path = "src/main.rs"

[[example]]
name = "vessel-preview"
path = "examples/vessel_preview.rs"

# -----------------------------------------------------------------------------
# THE NEURAL INTEGRATION: Full-Blooded Dependencies
# -----------------------------------------------------------------------------

[dependencies]
# Pulling the core pillars from the official registry
epoekie    = "0.1.0-alpha"
aicent     = "0.1.0-alpha"
rttp       = "0.1.0-alpha"
rpki-com   = "0.1.0-alpha"
zcmk       = "0.1.0-alpha"

# High-Performance Foundations
tokio = { version = "1.37", features = ["full", "tracing"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
log = "0.4"
tracing = "0.1"

# -----------------------------------------------------------------------------
# PROJECT STRUCTURE
# -----------------------------------------------------------------------------

[lib]
name = "aicent_vessel"
path = "src/lib.rs"

# -----------------------------------------------------------------------------
# RELEASE PROFILE: Saturated Speed Optimization
# -----------------------------------------------------------------------------

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = "symbols"
